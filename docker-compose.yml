# Docker Compose configuration for Recipedia application (Production)
# Railway will use this to deploy the app
services:
  web:
    build: .
    image: recipedia:latest
    command: /app/docker-entrypoint.sh
    environment:
      RAILS_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_MAX_THREADS: ${RAILS_MAX_THREADS:-10}
      LD_PRELOAD: ""
    ports:
      - "${PORT:-3000}:3000"

  worker:
    image: recipedia:latest
    command: bundle exec sidekiq -C config/sidekiq.yml
    environment:
      RAILS_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_MAX_THREADS: ${RAILS_MAX_THREADS:-10}
      LD_PRELOAD: ""
    depends_on:
      - web
